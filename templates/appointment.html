<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Edit Appointment' if edit_mode else 'Book Appointment' }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="top-right-nav">
        <a href="{{ url_for('profile') }}" class="nav-btn user-profile-btn"><i class="fa-solid fa-circle-user"></i><span>{{ username }}</span></a>
        <a href="{{ url_for('index') }}" class="nav-btn home-btn"><i class="fa-solid fa-house"></i><span>首頁</span></a>
        <a href="{{ url_for('appointment_list') }}" class="nav-btn info"><i class="fa-solid fa-calendar-check"></i><span>預約列表</span></a>
        <a href="{{ url_for('medication_list') }}" class="nav-btn success"><i class="fa-solid fa-pills"></i><span>用藥追蹤</span></a>
        <a href="{{ url_for('logout') }}" class="nav-btn logout-btn">登出</a>
    </div>

    <a href="{{ url_for('index') }}" class="logo-container">
        <i class="fa-solid fa-hospital"></i>
        <span>Medi Hospital</span>
    </a>

    <div class="page-container">
        <h1>
            <i class="fa-solid {{ 'fa-pen-to-square' if edit_mode else 'fa-calendar-plus' }}"></i>
            {{ '編輯預約' if edit_mode else '建立預約' }}
        </h1>

        {% if error %}
        <div style="background:#f8d7da;color:#721c24;padding:14px 16px;border-radius:10px;margin-bottom:18px;border:1px solid #f5c6cb;">
            <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('edit_appointment', apt_id=apt_id) if edit_mode else url_for('appointment') }}">
            <input type="hidden" name="lang" value="{{ lang or 'zh' }}">

            <div style="background:#f7f9fc;border:1px solid #e7ebf3;border-radius:14px;padding:18px;margin-bottom:20px;">
                <div class="form-group" style="margin-bottom:0;">
                    <label><i class="fa-solid fa-people-arrows"></i> 服務對象</label>
                    <select name="target_profile" id="target_profile" required>
                        {% for person in manageable_people %}
                        <option value="{{ person.target_value }}"
                            data-name="{{ person.patient_name }}"
                            data-phone="{{ person.patient_phone }}"
                            data-id="{{ person.patient_id }}"
                            {% if form_data and form_data.target_profile == person.target_value %}selected{% endif %}>
                            {{ person.label }} - {{ person.description }}
                        </option>
                        {% endfor %}
                    </select>
                    <small style="display:block;margin-top:6px;color:#6c757d;">
                        可直接替本人、長者、幼兒或已授權家庭帳號名下成員掛號。
                    </small>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>病患姓名</label>
                    <input type="text" name="patient_name" id="patient_name" required value="{{ form_data.patient_name if form_data else '' }}">
                </div>
                <div class="form-group">
                    <label>聯絡電話</label>
                    <input type="tel" name="patient_phone" id="patient_phone" required value="{{ form_data.patient_phone if form_data else '' }}">
                </div>
            </div>

            <div class="form-group">
                <label>病患身分證號 / 病歷號</label>
                <input type="text" name="patient_id" id="patient_id" value="{{ form_data.patient_id if form_data else '' }}">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>科別</label>
                    <select name="department" id="department" required>
                        <option value="">請選擇科別</option>
                        {% for dept in doctor_options.keys() %}
                        <option value="{{ dept }}" {% if form_data and form_data.department == dept %}selected{% endif %}>{{ dept }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>醫師</label>
                    <select name="doctor_name" id="doctor_name" required></select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>預約日期</label>
                    <input type="date" name="appointment_date" min="{{ min_date }}" required value="{{ form_data.appointment_date if form_data else '' }}">
                </div>
                <div class="form-group">
                    <label>預約時間</label>
                    <input type="time" name="appointment_time" required value="{{ form_data.appointment_time if form_data else '' }}">
                    <small style="display:block;margin-top:6px;color:#6c757d;">建議時段 09:00 - 21:00</small>
                </div>
            </div>

            <div class="form-group">
                <label>症狀或備註</label>
                <textarea name="symptoms" rows="4" placeholder="簡述目前狀況、照護需求或掛號原因">{{ form_data.symptoms if form_data else '' }}</textarea>
            </div>

            <div style="display:flex;gap:14px;margin-top:28px;">
                <button type="submit" class="btn btn-primary">{{ '儲存變更' if edit_mode else '確認預約' }}</button>
                <a href="{{ url_for('appointment_list') if edit_mode else url_for('index') }}" class="btn btn-secondary" style="text-decoration:none;">取消</a>
            </div>
        </form>
    </div>

    <script>
        const doctorOptions = {{ doctor_options | tojson | safe }};
        const targetSelect = document.getElementById('target_profile');
        const departmentSelect = document.getElementById('department');
        const doctorSelect = document.getElementById('doctor_name');
        const patientNameInput = document.getElementById('patient_name');
        const patientPhoneInput = document.getElementById('patient_phone');
        const patientIdInput = document.getElementById('patient_id');
        const existingDoctor = "{{ form_data.doctor_name if form_data else '' }}";

        function populateDoctors() {
            const dept = departmentSelect.value;
            doctorSelect.innerHTML = '<option value="">請選擇醫師</option>';
            (doctorOptions[dept] || []).forEach((doctor) => {
                const option = document.createElement('option');
                option.value = doctor.doctor_name;
                option.textContent = `${doctor.doctor_name} (${doctor.shift === 'morning' ? '上午' : '下午'})`;
                if (doctor.doctor_name === existingDoctor) {
                    option.selected = true;
                }
                doctorSelect.appendChild(option);
            });
        }

        function applyTargetPreset() {
            const selectedOption = targetSelect.options[targetSelect.selectedIndex];
            if (!selectedOption) return;
            if (!patientNameInput.value.trim()) {
                patientNameInput.value = selectedOption.dataset.name || '';
            }
            if (!patientPhoneInput.value.trim()) {
                patientPhoneInput.value = selectedOption.dataset.phone || '';
            }
            if (!patientIdInput.value.trim()) {
                patientIdInput.value = selectedOption.dataset.id || '';
            }
        }

        targetSelect.addEventListener('change', () => {
            patientNameInput.value = '';
            patientPhoneInput.value = '';
            patientIdInput.value = '';
            applyTargetPreset();
        });

        departmentSelect.addEventListener('change', populateDoctors);
        if (departmentSelect.value) populateDoctors();
        applyTargetPreset();
    </script>
</body>
</html>
